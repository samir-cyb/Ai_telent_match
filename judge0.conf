# Judge0 Configuration
################################################################################
# Database
################################################################################
POSTGRES_HOST=judge0-db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=YourStrongPasswordHere123

################################################################################
# Redis
################################################################################
REDIS_HOST=judge0-redis
REDIS_PORT=6379
REDIS_PASSWORD=YourRedisPasswordHere123

################################################################################
# Rails
################################################################################
RAILS_ENV=production
RAILS_MAX_THREADS=16
RAILS_SERVER_PROCESSES=4
SECRET_KEY_BASE=YourSecretKeyBaseHereMakeItLongAndRandom123456789

################################################################################
# Judge0
################################################################################
JUDGE0_CPUS=2.0
JUDGE0_MEMORY_LIMIT=512
JUDGE0_MAX_EXECUTION_TIME=5
JUDGE0_MAX_EXTRA_TIME=2
JUDGE0_MAX_WALL_TIME=10
JUDGE0_MAX_PROCESSES_AND_OR_THREADS=30
JUDGE0_ENABLE_NETWORK=false
JUDGE0_ALLOW_ENABLE_NETWORK=false
JUDGE0_RAILS_LOG_TO_STDOUT=true
JUDGE0_AUTH_HEADER=X-Judge0-User
JUDGE0_AUTH_TOKEN=your-judge0-auth-token-change-this-in-production
JUDGE0_ALLOW_ORIGIN=*
JUDGE0_CALLBACK_URL=
JUDGE0_NO_INDEX=false
JUDGE0_KEEP_OUTPUT_AND_ERROR_FILES=false
JUDGE0_KEEP_HEADERS_AND_BODY=false