{% extends "base.html" %}
{% block title %}Admin Login | AI Talent Match{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card glass-card">
        <div class="auth-header">
            <i class="fas fa-shield-alt"></i>
            <h2>Admin Login</h2>
            <p>Restricted access - Authorized personnel only</p>
        </div>

        <form id="admin-login-form" class="auth-form">
            <div class="form-group">
                <label for="email">Admin Email</label>
                <input type="email" id="email" name="email" placeholder="admin@system.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary btn-full">
                <i class="fas fa-lock"></i> Secure Login
            </button>
        </form>

        <div class="auth-footer">
            <p class="warning-text"><i class="fas fa-exclamation-triangle"></i> Unauthorized access is prohibited</p>
            <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>
</div>

<script>
document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
    btn.disabled = true;

    try {
        const response = await fetch('/api/auth/admin/login/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            })
        });

        const data = await response.json();
        
        if (data.status === 'success') {
            localStorage.setItem('admin_id', data.admin_id);
            localStorage.setItem('user_type', 'admin');
            localStorage.setItem('is_super_admin', data.is_super_admin);
            
            showNotification('Admin access granted', 'success');
            setTimeout(() => {
                window.location.href = data.redirect;
            }, 1000);
        } else {
            showNotification(data.message || 'Access denied', 'error');
        }
    } catch (error) {
        showNotification('Security error. Contact system administrator.', 'error');
    } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
    }
});

function showNotification(message, type) {
    const notif = document.createElement('div');
    notif.className = `notification ${type}`;
    notif.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
    notif.style.cssText = `
        position: fixed;
        top: 100px;
        right: 20px;
        padding: 1rem 2rem;
        border-radius: 0.5rem;
        background: ${type === 'success' ? 'rgba(72, 187, 255, 0.9)' : 'rgba(255, 88, 88, 0.9)'};
        color: white;
        z-index: 10000;
        animation: slideIn 0.3s ease;
    `;
    document.body.appendChild(notif);
    setTimeout(() => notif.remove(), 3000);
}
</script>

<style>
.auth-container {
    display: flex;
    min-height: 80vh;
    align-items: center;
    justify-content: center;
    padding: 2rem;
}

.auth-card {
    width: 100%;
    max-width: 450px;
    padding: 3rem;
    border-radius: 2rem;
    border: 1px solid rgba(255, 88, 88, 0.3);
}

.auth-header {
    text-align: center;
    margin-bottom: 2rem;
}

.auth-header i {
    font-size: 3rem;
    color: #ff5858;
    margin-bottom: 1rem;
}

.auth-header h2 {
    font-size: 1.8rem;
    margin-bottom: 0.5rem;
}

.auth-header p {
    color: #94a3b8;
}

.warning-text {
    color: #ff5858;
    font-size: 0.85rem;
    margin-bottom: 1rem;
}

.back-link {
    color: #48bbff;
    text-decoration: none;
    font-size: 0.9rem;
}

.back-link:hover {
    text-decoration: underline;
}

.form-group {
    margin-bottom: 1.5rem;
}

.form-group label {
    display: block;
    margin-bottom: 0.5rem;
    color: #cbd5e1;
    font-size: 0.9rem;
}

.form-group input {
    width: 100%;
    padding: 1rem;
    border: 1px solid rgba(255, 88, 88, 0.3);
    border-radius: 0.8rem;
    background: rgba(0, 0, 0, 0.3);
    color: white;
    font-size: 1rem;
    transition: all 0.3s;
}

.form-group input:focus {
    outline: none;
    border-color: #ff5858;
    box-shadow: 0 0 0 3px rgba(255, 88, 88, 0.1);
}

.btn-full {
    width: 100%;
    padding: 1rem;
    font-size: 1.1rem;
    background: linear-gradient(135deg, #ff5858, #ff8c42);
    border: none;
}

.btn-full:hover {
    background: linear-gradient(135deg, #ff4444, #ff7a2e);
}

.auth-footer {
    text-align: center;
    margin-top: 2rem;
    padding-top: 2rem;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
}
</style>
{% endblock %}
