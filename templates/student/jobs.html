{% extends "base.html" %}
{% block title %}Browse Jobs | AI Talent Match{% endblock %}

{% block content %}
<div class="container jobs-container">
    <!-- Header -->
    <div class="page-header glass-card">
        <a href="/student/dashboard/" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
        <h1><i class="fas fa-briefcase"></i> Browse Jobs</h1>
        <p>Find opportunities that match your skills and interests</p>
    </div>

    <!-- Search & Filter -->
    <div class="filters-bar glass-card">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" placeholder="Search by job title, company, or skills...">
        </div>
        <div class="filter-options">
            <select id="job-type-filter">
                <option value="">All Types</option>
                <option value="Remote">Remote</option>
                <option value="Hybrid">Hybrid</option>
                <option value="On-site">On-site</option>
            </select>
            <button class="btn-primary" onclick="filterJobs()">
                <i class="fas fa-filter"></i> Filter
            </button>
        </div>
    </div>

    <!-- Stats -->
    <div class="jobs-stats glass-card">
        <span id="jobs-count">Loading jobs...</span>
    </div>

    <!-- Jobs Grid -->
    <div id="jobs-grid" class="jobs-grid">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i> Loading opportunities...
        </div>
    </div>
</div>

<script>
const API_BASE = "http://127.0.0.1:8000/api";
const studentId = localStorage.getItem('student_id');

if (!studentId) {
    window.location.href = '/student/login/';
}

let allJobs = [];

// Load jobs
async function loadJobs() {
    try {
        const response = await fetch(`${API_BASE}/jobs/`);
        const data = await response.json();
        
        if (data.status === 'success') {
            allJobs = data.jobs;
            displayJobs(allJobs);
        }
    } catch (error) {
        console.error('Error loading jobs:', error);
        document.getElementById('jobs-grid').innerHTML = 
            '<p class="no-data">Error loading jobs. Please try again.</p>';
    }
}

function displayJobs(jobs) {
    const container = document.getElementById('jobs-grid');
    const countLabel = document.getElementById('jobs-count');
    
    countLabel.textContent = `${jobs.length} jobs available`;
    
    if (jobs.length === 0) {
        container.innerHTML = '<p class="no-data">No jobs found matching your criteria.</p>';
        return;
    }
    
    container.innerHTML = jobs.map(job => `
        <div class="job-card glass-card" onclick="viewJobDetail('${job.id}')">
            <div class="job-card-header">
                <div class="company-icon">
                    <i class="fas fa-building"></i>
                </div>
                <div class="job-title-info">
                    <h3>${job.title}</h3>
                    <p class="company-name">${job.company_name}</p>
                </div>
                <span class="job-type-badge">${job.job_type}</span>
            </div>
            
            <div class="job-description">
                ${job.description}
            </div>
            
            <div class="job-skills">
                ${job.required_skills.slice(0, 4).map(skill => 
                    `<span class="skill-tag">${skill}</span>`
                ).join('')}
                ${job.required_skills.length > 4 ? 
                    `<span class="skill-tag more">+${job.required_skills.length - 4}</span>` : ''}
            </div>
            
            <div class="job-footer">
                <div class="job-meta">
                    <span><i class="fas fa-map-marker-alt"></i> ${job.location || 'Remote'}</span>
                    <span><i class="fas fa-graduation-cap"></i> CGPA: ${job.min_cgpa || 'Any'}</span>
                </div>
                <button class="btn-primary btn-sm">
                    View Details <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>
    `).join('');
}

function filterJobs() {
    const searchTerm = document.getElementById('search-input').value.toLowerCase();
    const jobType = document.getElementById('job-type-filter').value;
    
    let filtered = allJobs.filter(job => {
        const matchesSearch = !searchTerm || 
            job.title.toLowerCase().includes(searchTerm) ||
            job.company_name.toLowerCase().includes(searchTerm) ||
            job.required_skills.some(s => s.toLowerCase().includes(searchTerm));
            
        const matchesType = !jobType || job.job_type === jobType;
        
        return matchesSearch && matchesType;
    });
    
    displayJobs(filtered);
}

function viewJobDetail(jobId) {
    window.location.href = `/student/job-detail/?id=${jobId}`;
}

// Search on enter key
document.getElementById('search-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') filterJobs();
});

// Load on page load
loadJobs();
</script>

<style>
.jobs-container {
    padding: 2rem 0;
}

.page-header {
    padding: 2rem;
    margin-bottom: 2rem;
}

.back-link {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    color: #94a3b8;
    text-decoration: none;
    margin-bottom: 1rem;
    transition: color 0.3s;
}

.back-link:hover {
    color: #48bbff;
}

.page-header h1 {
    font-size: 1.8rem;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
}

.filters-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    gap: 1rem;
    flex-wrap: wrap;
}

.search-box {
    flex: 1;
    min-width: 300px;
    position: relative;
}

.search-box i {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: #64748b;
}

.search-box input {
    width: 100%;
    padding: 1rem 1rem 1rem 3rem;
    border: 1px solid rgba(72, 187, 255, 0.3);
    border-radius: 0.8rem;
    background: rgba(0, 0, 0, 0.3);
    color: white;
    font-size: 1rem;
}

.filter-options {
    display: flex;
    gap: 0.8rem;
}

.filter-options select {
    padding: 0.8rem 1.5rem;
    border: 1px solid rgba(72, 187, 255, 0.3);
    border-radius: 0.8rem;
    background: rgba(0, 0, 0, 0.3);
    color: white;
    cursor: pointer;
}

.jobs-stats {
    padding: 1rem 1.5rem;
    margin-bottom: 1.5rem;
    color: #94a3b8;
    font-size: 0.9rem;
}

.jobs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 1.5rem;
}

.job-card {
    padding: 1.5rem;
    cursor: pointer;
    transition: all 0.3s;
    border: 1px solid rgba(72, 187, 255, 0.1);
}

.job-card:hover {
    transform: translateY(-5px);
    border-color: rgba(72, 187, 255, 0.4);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
}

.job-card-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1rem;
}

.company-icon {
    width: 50px;
    height: 50px;
    background: linear-gradient(135deg, #48bbff, #a855f7);
    border-radius: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 1.5rem;
}

.job-title-info {
    flex: 1;
}

.job-title-info h3 {
    font-size: 1.1rem;
    margin-bottom: 0.3rem;
    color: #f0f9ff;
}

.company-name {
    color: #94a3b8;
    font-size: 0.9rem;
}

.job-type-badge {
    background: rgba(72, 187, 255, 0.2);
    color: #48bbff;
    padding: 0.3rem 0.8rem;
    border-radius: 2rem;
    font-size: 0.8rem;
    font-weight: 500;
}

.job-description {
    color: #cbd5e1;
    font-size: 0.9rem;
    line-height: 1.6;
    margin-bottom: 1rem;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.job-skills {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1rem;
}

.skill-tag {
    background: rgba(72, 187, 255, 0.15);
    color: #48bbff;
    padding: 0.3rem 0.8rem;
    border-radius: 2rem;
    font-size: 0.8rem;
}

.skill-tag.more {
    background: rgba(168, 85, 247, 0.2);
    color: #a855f7;
}

.job-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 1rem;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
}

.job-meta {
    display: flex;
    gap: 1rem;
    color: #64748b;
    font-size: 0.85rem;
}

.job-meta i {
    color: #48bbff;
}

.no-data {
    text-align: center;
    color: #64748b;
    padding: 3rem;
    grid-column: 1 / -1;
}

@media (max-width: 768px) {
    .jobs-grid {
        grid-template-columns: 1fr;
    }
    
    .filters-bar {
        flex-direction: column;
        align-items: stretch;
    }
    
    .search-box {
        min-width: 100%;
    }
}
</style>
{% endblock %}
