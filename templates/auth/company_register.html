{% extends "base.html" %}
{% block title %}Company Registration | AI Talent Match{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card glass-card">
        <div class="auth-header">
            <i class="fas fa-building"></i>
            <h2>Register Your Company</h2>
            <p>Start finding top talent with AI-powered matching</p>
        </div>

        <form id="register-form" class="auth-form">
            <div class="form-group">
                <label for="name">Company Name *</label>
                <input type="text" id="name" name="name" placeholder="TechCorp Inc." required>
            </div>

            <div class="form-group">
                <label for="email">Company Email *</label>
                <input type="email" id="email" name="email" placeholder="hr@company.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" id="password" name="password" placeholder="Min 8 characters" required minlength="8">
            </div>

            <div class="form-group">
                <label for="industry">Industry *</label>
                <select id="industry" name="industry" required>
                    <option value="">Select Industry</option>
                    <option value="Technology">Technology</option>
                    <option value="Finance">Finance</option>
                    <option value="Healthcare">Healthcare</option>
                    <option value="Consulting">Consulting</option>
                    <option value="Manufacturing">Manufacturing</option>
                    <option value="Retail">Retail</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="size">Company Size *</label>
                <select id="size" name="size" required>
                    <option value="">Select Size</option>
                    <option value="Startup">Startup (1-50)</option>
                    <option value="Mid">Mid-size (51-500)</option>
                    <option value="Enterprise">Enterprise (500+)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="website">Company Website</label>
                <input type="url" id="website" name="website" placeholder="https://company.com">
            </div>

            <div class="form-group">
                <label for="description">Company Description</label>
                <textarea id="description" name="description" rows="3" placeholder="Tell us about your company..."></textarea>
            </div>

            <button type="submit" class="btn-primary btn-full">
                <i class="fas fa-check-circle"></i> Create Company Account
            </button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="/company/login/">Login here</a></p>
            <p class="switch-user">Are you a student? <a href="/student/register/">Register as Student</a></p>
        </div>
    </div>
</div>

<script>
document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
    btn.disabled = true;

    const formData = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        industry: document.getElementById('industry').value,
        size: document.getElementById('size').value,
        website: document.getElementById('website').value,
        description: document.getElementById('description').value
    };

    try {
        const response = await fetch('/api/auth/company/register/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
        });

        const data = await response.json();
        
        if (data.status === 'success') {
            showNotification('Registration successful! Redirecting to login...', 'success');
            setTimeout(() => {
                window.location.href = '/company/login/';
            }, 2000);
        } else {
            showNotification(data.message || 'Registration failed', 'error');
        }
    } catch (error) {
        showNotification('Network error. Please try again.', 'error');
    } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
    }
});

function showNotification(message, type) {
    const notif = document.createElement('div');
    notif.className = `notification ${type}`;
    notif.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
    notif.style.cssText = `
        position: fixed;
        top: 100px;
        right: 20px;
        padding: 1rem 2rem;
        border-radius: 0.5rem;
        background: ${type === 'success' ? 'rgba(72, 187, 255, 0.9)' : 'rgba(255, 88, 88, 0.9)'};
        color: white;
        z-index: 10000;
        animation: slideIn 0.3s ease;
    `;
    document.body.appendChild(notif);
    
    setTimeout(() => {
        notif.remove();
    }, 3000);
}
</script>

<style>
.auth-container {
    display: flex;
    min-height: 80vh;
    align-items: center;
    justify-content: center;
    padding: 2rem;
}

.auth-card {
    width: 100%;
    max-width: 500px;
    padding: 3rem;
    border-radius: 2rem;
}

.auth-header {
    text-align: center;
    margin-bottom: 2rem;
}

.auth-header i {
    font-size: 3rem;
    color: #48bbff;
    margin-bottom: 1rem;
}

.auth-header h2 {
    font-size: 1.8rem;
    margin-bottom: 0.5rem;
}

.auth-header p {
    color: #94a3b8;
}

.form-group {
    margin-bottom: 1.5rem;
}

.form-group label {
    display: block;
    margin-bottom: 0.5rem;
    color: #cbd5e1;
    font-size: 0.9rem;
}

.form-group input,
.form-group select,
.form-group textarea {
    width: 100%;
    padding: 1rem;
    border: 1px solid rgba(72, 187, 255, 0.3);
    border-radius: 0.8rem;
    background: rgba(0, 0, 0, 0.3);
    color: white;
    font-size: 1rem;
    transition: all 0.3s;
    font-family: inherit;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
    outline: none;
    border-color: #48bbff;
    box-shadow: 0 0 0 3px rgba(72, 187, 255, 0.1);
}

.form-group textarea {
    resize: vertical;
    min-height: 100px;
}

.btn-full {
    width: 100%;
    padding: 1rem;
    font-size: 1.1rem;
    margin-top: 1rem;
}

.auth-footer {
    text-align: center;
    margin-top: 2rem;
    padding-top: 2rem;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
}

.auth-footer p {
    color: #94a3b8;
    margin-bottom: 0.5rem;
}

.auth-footer a {
    color: #48bbff;
    text-decoration: none;
    font-weight: 600;
}

.switch-user {
    font-size: 0.9rem;
    margin-top: 1rem;
}

@media (max-width: 768px) {
    .auth-card {
        padding: 2rem;
    }
}
</style>
{% endblock %}
